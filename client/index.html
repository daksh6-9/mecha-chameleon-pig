<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mecha Chameleon: Pig Protocol</title>
    <link rel="stylesheet" href="/src/style.css">
</head>
<body>
    <div id="ui-layer">
        <div class="left-panel" id="login-screen">
            <h1 class="logo-title">PIG PROTOCOL</h1>
            <input type="text" id="playerName" value="CaptainPig73" placeholder="Enter Call Sign..." />
            <button class="menu-btn">HOME</button>
            <button class="menu-btn" style="background:#0099ff; box-shadow:0 5px 0 #0066cc;">PROFILE</button>
        </div>

        <div class="bottom-panel" id="action-panel">
            <div class="weapon-info">CHAMELEON RIFLE V1 - Pig-Pink Stealth Active</div>
            <button class="play-btn" id="joinBtn">PLAY</button>
        </div>

        <div id="hud" style="display: none;">
            <div id="timer">TIME: 120s</div>
            <div id="ability-cooldown">CAMO: READY (PRESS C)</div>
            <div id="view-mode">VIEW: FPP (PRESS V)</div>
        </div>
    </div>
    
    <script type="module" src="/src/main.js"></script>
</body>
</html>
